<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RECARGAS GAMES | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        
        #aviso-inicial { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        .aviso-card { background: #111827; border: 2px solid #ef4444; border-radius: 25px; padding: 30px; text-align: center; max-width: 350px; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }

        #modal-ruleta { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 400; backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .ruleta-container { position: relative; width: 260px; height: 260px; margin: 0 auto 20px; border: 8px solid #1e293b; border-radius: 50%; overflow: hidden; }
        #canvas-ruleta { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .marcador { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; }

        .game-card { background: #0f121a; border: 1px solid #1e293b; border-radius: 18px; margin-bottom: 10px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .product-name { font-weight: 900; color: white; font-size: 14px; text-transform: uppercase; }
        .btn-action { background: linear-gradient(90deg, #1d4ed8, #3b82f6); color: white; font-weight: 900; padding: 10px 18px; border-radius: 12px; font-size: 10px; }
        
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; margin-top: 8px; font-size: 14px; }
        
        .verificando { color: #f59e0b; font-size: 10px; font-weight: 900; margin-top: 5px; display: none; align-items: center; gap: 5px; }
        .verificado { color: #10b981; font-size: 10px; font-weight: 900; margin-top: 5px; display: none; align-items: center; gap: 5px; }

        .tab-btn { border-bottom: 2px solid transparent; transition: 0.3s; opacity: 0.5; padding-bottom: 5px; font-weight: bold; }
        .tab-btn.active { border-color: #3b82f6; color: #3b82f6; opacity: 1; }

        #aviso-dinamico { display: none; background: rgba(245, 158, 11, 0.1); border: 1px solid #f59e0b; border-radius: 10px; padding: 10px; margin-bottom: 15px; font-size: 11px; font-weight: 800; color: #f59e0b; text-align: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="aviso-inicial">
        <div class="aviso-card">
            <i class="fas fa-shield-alt text-red-500 text-5xl mb-4"></i>
            <h2 class="header-font text-white font-black text-xl mb-4 italic uppercase">¡IMPORTANTE!</h2>
            <p class="text-sm text-gray-300 font-bold mb-6">Verifica tus datos. Errores en ID o correo no tienen reembolso.</p>
            <button onclick="cerrarAviso()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs tracking-widest">Aceptar y Entrar</button>
        </div>
    </div>

    <div id="modal-ruleta">
        <div class="bg-[#111827] border-2 border-blue-600 rounded-[30px] p-6 text-center max-w-sm w-full">
            <h2 class="header-font text-white font-black text-xl mb-2 uppercase italic">¡ORDEN ENVIADA!</h2>
            <p class="text-xs text-blue-400 font-bold mb-4 uppercase">Gira y toma captura a tu premio</p>
            <div class="ruleta-container">
                <div class="marcador"></div>
                <canvas id="canvas-ruleta" width="300" height="300"></canvas>
            </div>
            <button id="btn-girar" onclick="girarRuleta()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs">Girar Ruleta</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-[#05070a]/90 border-b border-white/5 backdrop-blur-md px-6 py-5 flex justify-center">
        <h1 class="header-font text-lg font-black italic text-white uppercase tracking-tighter">Recargas<span class="text-blue-500">Games</span></h1>
    </nav>

    <div class="flex overflow-x-auto gap-6 px-6 py-4 bg-[#0a0d14] border-b border-white/5 no-scrollbar mb-4">
        <button onclick="cambiarCategoria('Free Fire', this)" class="tab-btn active text-[11px] uppercase">Free Fire</button>
        <button onclick="cambiarCategoria('Netflix', this)" class="tab-btn text-[11px] uppercase">Netflix</button>
        <button onclick="cambiarCategoria('Roblox', this)" class="tab-btn text-[11px] uppercase">Roblox</button>
        <button onclick="cambiarCategoria('Block Strike', this)" class="tab-btn text-[11px] uppercase">Block Strike</button>
    </div>

    <main class="max-w-md mx-auto px-4">
        <div id="aviso-dinamico"></div>
        <div id="grid-productos"></div>

        <div id="seccion-pago" class="hidden mt-6">
            <div class="bg-[#161b26] rounded-2xl border border-white/5 p-5 mb-6">
                <div class="flex justify-between items-center mb-4 text-[10px] font-black uppercase text-blue-500">
                    <span>Pago Móvil (0102)</span>
                    <span>Venezuela</span>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span>Teléfono:</span> <b class="text-white">04228242411</b></div>
                    <div class="flex justify-between"><span>C.I:</span> <b class="text-white">V-32824869</b></div>
                    <div class="flex justify-between text-green-400 font-black uppercase pt-2 border-t border-white/5">
                        <span>Total:</span> <span id="monto-bs-display">0.00 Bs</span>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <div id="campos-dinamicos"></div>
                <input type="text" id="ref-pago" placeholder="REFERENCIA (4 DÍGITOS)" class="input-field font-bold" maxlength="4">
                <input type="text" id="input-descuento" placeholder="CÓDIGO" class="input-field border-dashed border-blue-500/50 uppercase font-bold" oninput="aplicarDescuento()">
                
                <button onclick="finalizarYEnviar()" class="btn-action w-full py-5 mt-4 uppercase tracking-widest text-xs">Finalizar en WhatsApp <i class="fab fa-whatsapp ml-1"></i></button>
            </div>
        </div>
    </main>

    <script>
        const TASA = 650.00;
        const TU_WHATSAPP = "584228242411";
        let prodSeleccionado = null;
        let categoriaActiva = "Free Fire";
        let timeoutVerificacion;
        let precioFinal = 0;

        const productos = {
            "Free Fire": [{ n: "110 DIAMANTES 💎", u: 0.97 }, { n: "220 DIAMANTES 💎", u: 1.96 }, { n: "572 DIAMANTES 💎", u: 4.89 }, { n: "T. SEMANAL", u: 2.50 }, { n: "T. MENSUAL", u: 11.00 }],
            "Netflix": [{ n: "PANTALLA NETFLIX 📺", u: 4.50 }],
            "Roblox": [{ n: "400 ROBUX 🧸", u: 5.00 }, { n: "800 ROBUX 🧸", u: 10.00 }],
            "Block Strike": [
                { n: "51 MONEDAS 🪙", u: 0.52 }, { n: "105 MONEDAS 🪙", u: 1.00 }, { n: "320 MONEDAS 🪙", u: 2.95 }, 
                { n: "540 MONEDAS 🪙", u: 4.90 }, { n: "1100 MONEDAS 🪙", u: 10.00 }, { n: "2260 MONEDAS 🪙", u: 20.00 },
                { n: "5800 MONEDAS 🪙", u: 48.00 }, { n: "PASE ELITE 🏆", u: 4.15 }, { n: "PASE ELITE PLUS 🏆", u: 10.00 },
                { n: "PASE DE MEJORA ✨", u: 2.10 }
            ]
        };

        function cambiarCategoria(cat, btn) {
            categoriaActiva = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const aviso = document.getElementById('aviso-dinamico');
            const campos = document.getElementById('campos-dinamicos');
            
            if(cat === 'Roblox') {
                aviso.style.display = 'block'; aviso.innerText = "⚠️ RECARGA POR CUENTA (CORREO Y CLAVE)";
                campos.innerHTML = `
                    <input type="text" id="d1" placeholder="CORREO" class="input-field font-bold w-full" oninput="validar()">
                    <input type="password" id="d2" placeholder="CONTRASEÑA" class="input-field font-bold w-full mt-2">`;
            } else if(cat === 'Netflix') {
                aviso.style.display = 'block'; aviso.innerText = "📺 INDICA TU NÚMERO DE TELÉFONO";
                campos.innerHTML = `<input type="text" id="d1" placeholder="NÚMERO DE TELÉFONO" class="input-field font-bold w-full" oninput="validar()">`;
            } else {
                aviso.style.display = 'none';
                campos.innerHTML = `<input type="text" id="d1" placeholder="ID DEL JUGADOR" class="input-field font-bold w-full" oninput="validar()">`;
            }
            campos.innerHTML += `<div id="v-b" class="verificando uppercase">🔍 Verificando...</div><div id="v-l" class="verificado uppercase">✅ Verificado</div>`;

            const grid = document.getElementById('grid-productos');
            grid.innerHTML = productos[cat].map(i => `
                <div class="game-card">
                    <div>
                        <h4 class="product-name mb-1">${i.n}</h4>
                        <span class="text-blue-500 font-black">${(i.u * TASA).toFixed(2)} BS</span>
                    </div>
                    <button onclick="seleccionar('${i.n}', ${i.u * TASA})" class="btn-action">ELEGIR</button>
                </div>`).join('');
            document.getElementById('seccion-pago').classList.add('hidden');
        }

        function seleccionar(n, pb) {
            prodSeleccionado = { nombre: n, precio: pb };
            precioFinal = pb;
            document.getElementById('monto-bs-display').innerText = pb.toFixed(2) + " Bs";
            document.getElementById('seccion-pago').classList.remove('hidden');
            document.getElementById('seccion-pago').scrollIntoView({ behavior: 'smooth' });
        }

        function validar() {
            const b = document.getElementById('v-b'), l = document.getElementById('v-l'), v = document.getElementById('d1').value;
            b.style.display = 'none'; l.style.display = 'none';
            clearTimeout(timeoutVerificacion);
            if(v.length >= 8) {
                b.style.display = 'flex';
                timeoutVerificacion = setTimeout(() => { b.style.display = 'none'; l.style.display = 'flex'; }, 1500);
            }
        }

        function aplicarDescuento() {
            const input = document.getElementById('input-descuento').value.toUpperCase();
            precioFinal = (input === "GAMES") ? prodSeleccionado.precio * 0.97 : prodSeleccionado.precio;
            document.getElementById('monto-bs-display').innerText = precioFinal.toFixed(2) + " Bs";
        }

        function finalizarYEnviar() {
            const d1 = document.getElementById('d1').value, ref = document.getElementById('ref-pago').value;
            if(!d1 || !ref) return alert("⚠️ Completa los datos");
            
            let extra = (categoriaActiva === 'Roblox') ? `\n🔑 Pass: ${document.getElementById('d2').value}` : "";
            let msg = `*NUEVA ORDEN*\nJuego: ${categoriaActiva}\nProd: ${prodSeleccionado.nombre}\nMonto: ${precioFinal.toFixed(2)} Bs\nDato: ${d1}${extra}\nRef: ${ref}`;
            
            window.open(`https://wa.me/${TU_WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
            document.getElementById('modal-ruleta').style.display = 'flex';
            dibujarRuleta();
        }

        function cerrarAviso() { document.getElementById('aviso-inicial').style.display = 'none'; }

        const canvas = document.getElementById('canvas-ruleta');
        const ctx = canvas.getContext('2d');
        function dibujarRuleta() {
            const opts = ["REGALO", "SIGUE", "PREMIO", "SIGUE", "BONO", "SIGUE"];
            const colors = ["#1d4ed8", "#111827", "#3b82f6", "#111827", "#1d4ed8", "#111827"];
            opts.forEach((opt, i) => {
                ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(150,150);
                ctx.arc(150,150,150, i * Math.PI/3, (i+1) * Math.PI/3); ctx.fill();
                ctx.save(); ctx.translate(150,150); ctx.rotate(i*Math.PI/3 + Math.PI/6);
                ctx.fillStyle="white"; ctx.font="bold 12px Orbitron"; ctx.fillText(opt, 60, 5); ctx.restore();
            });
        }
        function girarRuleta() {
            const r = Math.floor(3000 + Math.random() * 2000);
            canvas.style.transform = `rotate(${r}deg)`;
            setTimeout(() => alert("¡Captura tu premio y envíalo al WhatsApp! 🎁"), 4000);
        }

        window.onload = () => cambiarCategoria('Free Fire', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
