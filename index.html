<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RECARGAS GAMES | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }
        .header-font { font-family: 'Orbitron', sans-serif; }
        
        /* TARJETA DE PAGO */
        .pago-card { background: #161b26; border-radius: 20px; border: 1px solid #1e293b; padding: 20px; }
        .pago-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .label { color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .value { color: white; font-size: 15px; font-weight: 900; }
        .value-monto { color: #10b981; font-size: 16px; font-weight: 900; }
        .btn-copy-small { background: #1e293b; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .btn-copy-all { background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.3); color: #f97316; width: 100%; padding: 14px; border-radius: 15px; font-weight: 900; text-transform: uppercase; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; }

        /* RULETA */
        #modal-ruleta { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        #wheel { width: 260px; height: 260px; border-radius: 50%; border: 6px solid #1e293b; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); background: conic-gradient(#2563eb 0deg 60deg, #0f172a 60deg 120deg, #1e293b 120deg 180deg, #0f172a 180deg 240deg, #1e293b 240deg 300deg, #0f172a 300deg 360deg); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 110; }

        /* PRODUCTOS */
        .game-card { background: #0f121a; border: 1px solid #1e293b; border-radius: 18px; margin-bottom: 10px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .product-name { font-weight: 900; color: white; font-size: 18px; text-transform: uppercase; }
        .price-bs { color: #3b82f6; font-weight: 900; font-size: 15px; }
        .price-usd { color: #64748b; font-weight: 700; font-size: 11px; margin-left: 4px; }
        .btn-action { background: linear-gradient(90deg, #1d4ed8, #3b82f6); color: white; font-weight: 900; padding: 12px 20px; border-radius: 14px; font-size: 10px; }
        
        .tab-btn { border-bottom: 2px solid transparent; transition: 0.3s; opacity: 0.5; padding-bottom: 5px; font-weight: bold; }
        .tab-btn.active { border-color: #3b82f6; color: #3b82f6; opacity: 1; }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; margin-top: 8px; font-size: 14px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="modal-ruleta">
        <div class="text-center p-8 bg-[#0a0d14] border border-white/5 rounded-[2.5rem] max-w-sm w-full mx-4 shadow-2xl">
            <h2 class="header-font text-white font-black text-xl mb-2 italic">¿SUERTE?</h2>
            <p class="text-[10px] text-gray-400 mb-8 font-bold uppercase tracking-widest">Gira por tu bono de 110💎</p>
            <div class="relative w-max mx-auto mb-8">
                <div class="pointer"></div>
                <div id="wheel"></div>
            </div>
            <button onclick="girarRuletaFinal()" id="btn-girar-final" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-[10px]">Girar Ruleta 🎡</button>
            <p id="texto-premio" class="mt-4 font-black text-sm"></p>
        </div>
    </div>

    <nav class="sticky top-0 z-50 bg-[#05070a]/90 border-b border-white/5 backdrop-blur-md px-6 py-5 flex justify-center">
        <h1 class="header-font text-lg font-black italic text-white uppercase tracking-tighter">Recargas<span class="text-blue-500">Games</span></h1>
    </nav>

    <div class="flex overflow-x-auto gap-6 px-6 py-4 bg-[#0a0d14] border-b border-white/5 no-scrollbar mb-4">
        <button onclick="cambiarCategoria('Free Fire', this)" class="tab-btn active text-[11px] uppercase">Free Fire</button>
        <button onclick="cambiarCategoria('Netflix', this)" class="tab-btn text-[11px] uppercase">Netflix</button>
        <button onclick="cambiarCategoria('Roblox', this)" class="tab-btn text-[11px] uppercase">Roblox</button>
        <button onclick="cambiarCategoria('Block Strike', this)" class="tab-btn text-[11px] uppercase">Block Strike</button>
    </div>

    <main class="max-w-md mx-auto px-4">
        <div id="grid-productos"></div>

        <div id="seccion-pago" class="hidden mt-6">
            <div class="pago-card shadow-2xl">
                <div class="pago-item">
                    <div><p class="label">Banco</p><p class="value">Venezuela (0102)</p></div>
                    <button onclick="copiarTexto('Venezuela (0102)')" class="btn-copy-small"><i class="fas fa-copy"></i></button>
                </div>
                <div class="pago-item">
                    <div><p class="label">Teléfono</p><p class="value">0422-8241596</p></div>
                    <button onclick="copiarTexto('04228241596')" class="btn-copy-small"><i class="fas fa-copy"></i></button>
                </div>
                <div class="pago-item">
                    <div><p class="label">Cédula</p><p class="value">V-32824869</p></div>
                    <button onclick="copiarTexto('32824869')" class="btn-copy-small"><i class="fas fa-copy"></i></button>
                </div>
                <div class="pago-item">
                    <div><p class="label">Monto</p><p id="monto-bs-display" class="value-monto">0.00 Bs</p></div>
                    <button onclick="copiarMonto()" class="btn-copy-small"><i class="fas fa-copy"></i></button>
                </div>
                <button onclick="copiarTodo()" class="btn-copy-all"><i class="fas fa-copy"></i> Copiar todos los datos</button>
            </div>

            <div class="mt-6 space-y-3">
                <input type="text" id="campo-identificador" placeholder="ID DEL JUGADOR" class="input-field font-bold uppercase">
                <input type="email" id="correo-roblox" placeholder="CORREO DE LA CUENTA" class="input-field font-bold hidden">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="ref-pago" placeholder="REF (4 DÍG)" class="input-field" maxlength="4">
                    <input type="text" id="nombre-cliente" placeholder="TU NOMBRE" class="input-field">
                </div>
                <button onclick="finalizarYEnviar()" class="btn-action w-full py-5 mt-2 uppercase tracking-widest text-xs">Enviar Pedido <i class="fab fa-whatsapp ml-1"></i></button>
            </div>
        </div>
    </main>

    <script>
        const TASA = 650.00;
        const TU_WHATSAPP = "584228242411";
        let prodSeleccionado = null;
        let categoriaActiva = "Free Fire";

        const productosData = {
            "Free Fire": [
                { n: "110 DIAMANTES 💎", u: 0.97 }, { n: "220 DIAMANTES 💎", u: 1.96 },
                { n: "341 DIAMANTES 💎", u: 3.20 }, { n: "572 DIAMANTES 💎", u: 4.89 },
                { n: "1166 DIAMANTES 💎", u: 9.00 }, { n: "2398 DIAMANTES 💎", u: 19.00 },
                { n: "6160 DIAMANTES 💎", u: 48.00 },
                { n: "T. SEMANAL BÁSICA", u: 0.73 }, { n: "T. SEMANAL", u: 2.50 },
                { n: "T. MENSUAL", u: 11.00 }, { n: "PASE BOOYAH", u: 3.50 }, { n: "PASE DE NIVEL", u: 4.00 }
            ],
            "Netflix": [{ n: "NETFLIX BÁSICO 📺", u: 4.50 }],
            "Roblox": [{ n: "400 ROBUX 🧸", u: 5.00 }, { n: "800 ROBUX 🧸", u: 10.00 }],
            "Block Strike": [
                { n: "51 MONEDAS 🪙", u: 0.52 }, { n: "105 MONEDAS 🪙", u: 1.00 },
                { n: "320 MONEDAS 🪙", u: 2.95 }, { n: "540 MONEDAS 🪙", u: 4.90 },
                { n: "1100 MONEDAS 🪙", u: 10.00 }, { n: "2260 MONEDAS 🪙", u: 20.00 },
                { n: "5800 MONEDAS 🪙", u: 48.00 }, { n: "PASE ELITE 🏆", u: 4.15 },
                { n: "ELITE PLUS 🏆", u: 10.00 }, { n: "PASÉ DE MEJORA", u: 2.10 }
            ]
        };

        function copiarTexto(t) { navigator.clipboard.writeText(t); alert("Copiado ✅"); }
        function copiarMonto() { if(prodSeleccionado) { navigator.clipboard.writeText(prodSeleccionado.precioBs.toFixed(2)); alert("Monto Copiado ✅"); } }
        function copiarTodo() { const t = `Banco: Venezuela (0102)\nTeléfono: 04228241596\nCédula: 32824869\nMonto: ${prodSeleccionado.precioBs.toFixed(2)} Bs`; navigator.clipboard.writeText(t); alert("Datos Copiados ✅"); }

        function cambiarCategoria(cat, btn) {
            categoriaActiva = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'text-white'));
            btn.classList.add('active', 'text-white');
            document.getElementById('correo-roblox').classList.toggle('hidden', cat !== 'Roblox');
            document.getElementById('campo-identificador').placeholder = (cat === 'Netflix') ? "NÚMERO DE TELÉFONO" : "ID DEL JUGADOR";

            const grid = document.getElementById('grid-productos');
            grid.innerHTML = (productosData[cat] || []).map(item => {
                const pb = (item.u * TASA).toLocaleString('es-VE', {minimumFractionDigits: 2});
                return `<div class="game-card">
                    <div>
                        <h4 class="product-name mb-1">${item.n}</h4>
                        <span class="price-bs">${pb} BS</span><span class="price-usd">($${item.u.toFixed(2)})</span>
                    </div>
                    <button onclick="seleccionar('${item.n}', ${item.u * TASA}, ${item.u})" class="btn-action">ELEGIR</button>
                </div>`;
            }).join('');
            document.getElementById('seccion-pago').classList.add('hidden');
        }

        function seleccionar(n, pb, u) {
            prodSeleccionado = { nombre: n, precioBs: pb, usd: u };
            document.getElementById('monto-bs-display').innerText = pb.toFixed(2) + " Bs";
            document.getElementById('seccion-pago').classList.remove('hidden');
            document.getElementById('seccion-pago').scrollIntoView({ behavior: 'smooth' });
        }

        function finalizarYEnviar() {
            const id = document.getElementById('campo-identificador').value;
            const ref = document.getElementById('ref-pago').value;
            const nom = document.getElementById('nombre-cliente').value;
            if(!id || !ref || !nom) return alert("⚠️ Completa tus datos");

            let labelId = (categoriaActiva === 'Netflix') ? "TELÉFONO" : "ID";
            let msg = `*🎮 NUEVA ORDEN*%0A` + `━━━━━━━━━━━━━━%0A` + `🕹️ *JUEGO:* ${categoriaActiva}%0A` + `📌 *PRODUCTO:* ${prodSeleccionado.nombre}%0A` + `💰 *MONTO:* ${prodSeleccionado.precioBs.toFixed(2)} Bs ($${prodSeleccionado.usd.toFixed(2)})%0A` + `📱 *${labelId}:* ${id}%0A` + `🧾 *REF:* ${ref}%0A` + `👤 *CLIENTE:* ${nom}%0A` + `━━━━━━━━━━━━━━`;

            window.open(`https://wa.me/${TU_WHATSAPP}?text=${msg}`, '_blank');
            if(categoriaActiva !== 'Netflix') {
                setTimeout(() => { document.getElementById('modal-ruleta').style.display = 'flex'; }, 1000);
            }
        }

        function girarRuletaFinal() {
            const wheel = document.getElementById('wheel');
            const res = document.getElementById('texto-premio');
            const randomGiro = Math.floor(Math.random() * 360) + 1440; 
            wheel.style.transform = `rotate(${randomGiro}deg)`;
            document.getElementById('btn-girar-final').disabled = true;

            setTimeout(() => {
                const finalDegree = randomGiro % 360;
                if (finalDegree >= 300 || finalDegree <= 60) {
                    res.innerText = "🎁 ¡GANASTE 110 DIAMANTES!";
                    res.className = "mt-4 font-black text-sm text-green-400 animate-bounce";
                } else {
                    res.innerText = "❌ No hubo suerte esta vez";
                    res.className = "mt-4 font-black text-sm text-gray-500";
                }
                setTimeout(() => { location.reload(); }, 4000);
            }, 4000);
        }

        window.onload = () => cambiarCategoria('Free Fire', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
